<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MMUInsight{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="container">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
    <div class="div-1">
        <h1 class="Homepage-header">
            <p class="Logo">
                Logo here
            </p>
            <div class="buttons">
                <a href="Professor-info.html"><button>Professors</button></a>
                <a href="register.html"><button>Register</button></a>
                <a href="Untitled-4.html"><button>Page 3</button></a>
                <a href="Untitled-5.html"><button>Page 4</button></a>
            </div>
        </h1>
    </div>
    <br>
    <br>
    <div class="div-2">
        <!--<h3 class="description">
            Description is WIP. In the mean time, look at Isac sleeping his ass off before 10.
            <img src="C:\Users\Jimha\Projects\MMUInsight\templates\Sleeping.jpg">
        </h3>-->
        <p class="search-bar">Type your Professor's Name here</p>
        <input type="search" placeholder="Search..">
    </div>
    <br>
    <br>
    <div class="div-3">
        Contributors
    </div>

        <h2 class="member-1">Jimmy</h2> <h2 class="member-2">Isac</h2> <h2 class="member-3">Ming Hao</h2>
