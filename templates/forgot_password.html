{% extends 'base.html' %}

{% block title %}Reset Password - MMUInsight{% endblock %}

{% block content %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="container" style="max-width: 450px;">
    <div class="glass-form">
        <h2 style="margin-bottom: 1.5rem; color: var(--gray-900);">Reset Password</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Enter your email address and we'll send you a link to reset your password.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required class="glass-input">
            </div>
            
            <button type="submit" class="btn btn-block btn-lg" style="margin-top: 1.5rem;">Send Reset Link</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid rgba(37, 99, 235, 0.1); padding-top: 1.5rem;">
            <p style="margin-bottom: 0;"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
        </div>
    </div>
</div>
{% endblock %}
