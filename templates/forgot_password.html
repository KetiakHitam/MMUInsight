{% extends 'base.html' %}

{% block title %}Reset Password - MMUInsight{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px;">
    <div class="card">
        <div class="card-header">
            <h2 style="margin-bottom: 0;">Reset Password</h2>
        </div>
        <div class="card-body">
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Enter your email address and we'll send you a link to reset your password.</p>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                
                <button type="submit" class="btn btn-block btn-lg" style="margin-top: 1.5rem;">Send Reset Link</button>
            </form>
        </div>
        <div class="card-footer" style="text-align: center;">
            <p style="margin-bottom: 0;"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
        </div>
    </div>
</div>
{% endblock %}
