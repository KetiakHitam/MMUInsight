{% extends 'base.html' %}

{% block title %}Login - MMUInsight{% endblock %}

{% block content %}
<style>
.password-wrapper {
    position: relative;
}
.password-toggle {
    position: absolute;
    right: 2px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    padding: 8px;
    color: #666;
    font-size: 18px;
    outline: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: none;
    margin: 0;
    line-height: 1;
    width: 36px;
    height: 36px;
}
.password-toggle:hover {
    color: #333;
    background: none;
    transform: translateY(-50%);
}
.password-toggle:focus {
    outline: none;
    background: none;
    transform: translateY(-50%);
}
.password-toggle:active {
    background: none;
    transform: translateY(-50%);
}
.password-toggle svg {
    width: 20px;
    height: 20px;
    display: block;
}
</style>

<div class="container" style="max-width: 450px;">
    <div class="glass-form">
        <h2 style="margin-bottom: 1.5rem; color: var(--gray-900);">Welcome Back</h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required class="glass-input">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required class="glass-input" style="padding-right: 45px;">
                    <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle class="eye-open" cx="12" cy="12" r="3"></circle>
                            <path class="eye-closed" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" style="display:none;"></path>
                            <line class="eye-closed" x1="1" y1="1" x2="23" y2="23" style="display:none;"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-block btn-lg" style="margin-top: 1.5rem;">Login</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid rgba(37, 99, 235, 0.1); padding-top: 1.5rem;">
            <p style="margin-bottom: 0;">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
            <p style="margin-bottom: 0; margin-top: 0.5rem;"><a href="{{ url_for('auth.forgot_password') }}">Forgot your password?</a></p>
            <p style="margin-bottom: 0; margin-top: 0.5rem;"><a href="{{ url_for('auth.resend_verification_page') }}">Resend verification email</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    const eyeOpen = button.querySelectorAll('.eye-open');
    const eyeClosed = button.querySelectorAll('.eye-closed');
    if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.forEach(el => el.style.display = 'none');
        eyeClosed.forEach(el => el.style.display = 'block');
    } else {
        input.type = 'password';
        eyeOpen.forEach(el => el.style.display = 'block');
        eyeClosed.forEach(el => el.style.display = 'none');
    }
}
</script>
{% endblock %}
