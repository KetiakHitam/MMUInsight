{% extends 'base.html' %}

{% block title %}Login - MMUInsight{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px;">
    <div class="card">
        <div class="card-header">
            <h2 style="margin-bottom: 0;">Welcome Back</h2>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-block btn-lg" style="margin-top: 1.5rem;">Login</button>
            </form>
        </div>
        <div class="card-footer" style="text-align: center;">
            <p style="margin-bottom: 0;">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
            <p style="margin-bottom: 0; margin-top: 0.5rem;"><a href="{{ url_for('auth.forgot_password') }}">Forgot your password?</a></p>
        </div>
    </div>
</div>
{% endblock %}
