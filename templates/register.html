<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', filename='css/register.css') }}" rel="stylesheet">
    <title>Register</title>
</head>
<body>
    <div>
    <h1>Register</h1>

    <form method="POST" action="/register">
        <label>Email:</label>
        <input class="email-input" type="email" name="email" required><br><br>

        <label>Password:</label>
        <input type="password" name="password" required><br><br>
        <label class="Confirm-password">Confirm Password:</label>
        <input type="password" name="confirm_password" required><br><br>

        <label class="User-type">User Type:</label><br>
        <select name="user_type" required>
            <option value="student">Student</option>
            <option value="lecturer">Lecturer</option>
        </select>
        <button class="register-button" type="submit">Register</button>
        <br>
        <br>
        <br>
        <p class="Warning">PLEASE DON'T USE YOUR REAL MMU PASSWORD!</p>
        <p class="Login">Already registered? <a href="login.html">Login</a> now</p>
    </form>
    </div>
</body>
</html>
