{% extends 'base.html' %}

{% block title %}Set New Password - MMUInsight{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px;">
    <div class="card">
        <div class="card-header">
            <h2 style="margin-bottom: 0;">Set New Password</h2>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter new password" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
                </div>

                <button type="submit" class="btn btn-block btn-lg" style="margin-top: 1.5rem;">Update Password</button>
            </form>
        </div>
        <div class="card-footer" style="text-align: center;">
            <p style="margin-bottom: 0;"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
        </div>
    </div>
</div>
{% endblock %}
