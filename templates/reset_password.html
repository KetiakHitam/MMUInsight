{% extends 'base.html' %}

{% block title %}Set New Password - MMUInsight{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px;">
    <div class="glass-form">
        <h2 style="margin-bottom: 1.5rem; color: var(--gray-900);">Set New Password</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="Enter new password" required class="glass-input">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required class="glass-input">
            </div>

            <button type="submit" class="btn btn-block btn-lg" style="margin-top: 1.5rem;">Update Password</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid rgba(37, 99, 235, 0.1); padding-top: 1.5rem;">
            <p style="margin-bottom: 0.5rem;"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
            <p style="margin: 0;"><a href="{{ url_for('index') }}">Back to Home</a></p>
        </div>
    </div>
</div>
{% endblock %}
